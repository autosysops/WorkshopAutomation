trigger:
- none

pool:
  vmImage: Self Hosted #Change this to the name of your pool

jobs:
- job: job1
  pool: Self Hosted #Change this to the name of your pool
  steps:
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: '1..10 | Foreach-Object { Write-Host "Count $_ and wait 5 seconds"; Start-Sleep -Seconds 5}'
      pwsh: true
- job: job2
  pool:
    vmImage: ubuntu-latest
  steps:
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: '1..10 | Foreach-Object { Write-Host "Count $_ and wait 5 seconds"; Start-Sleep -Seconds 5}'
      pwsh: true
