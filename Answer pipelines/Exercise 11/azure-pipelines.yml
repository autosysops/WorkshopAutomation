trigger:
- none

pool:
  vmImage: Self Hosted

stages:
- stage: stage1
  dependsOn: []
  jobs:
  - template: template.yml
    parameters:
      groupname: group1
- stage: stage2
  dependsOn: []
  jobs:
  - template: template.yml
    parameters:
      groupname: group2
- stage: stage3
  dependsOn: [stage1, stage2]
  jobs:
  - template: template.yml
    parameters:
      groupname: group3

