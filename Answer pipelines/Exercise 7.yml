trigger:
- none

pool:
  vmImage: Self Hosted

stages:
- stage: stage1
  dependsOn: []
  jobs:
  - job: job1
    pool: Self Hosted
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: 'Write-Host "Hello World"'
        pwsh: true
- stage: stage2
  dependsOn: []
  jobs:
  - job: job2
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: '1..10 | Foreach-Object { Write-Host "Count $_ and wait 5 seconds"; Start-Sleep -Seconds 5}'
        pwsh: true
- stage: stage3
  dependsOn: [stage1, stage2]
  jobs:
  - job: job3
    pool: Self Hosted
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: '1..10 | Foreach-Object { Write-Host "Count $_ and wait 5 seconds"; Start-Sleep -Seconds 5}'
        pwsh: true

